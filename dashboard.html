<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảng điều khiển - Bold Brew</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=Outfit:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles/bold-brew.css">
  <link rel="stylesheet" href="styles/dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
  <div class="dashboard-layout">
    <aside class="dash-sidebar" id="dashSidebar"></aside>

    <main class="dash-main">

      <div class="member-header">
        <div>
          <h1>Xin chào, <span id="userName">Khách</span>!</h1>
          <p class="text-muted">Chào mừng bạn đến với bảng điều khiển cá nhân của Bold Brew</p>
        </div>

        <img src="" alt="" class="dash-avatar" id="userAvatar" hidden>
      </div>
      <a href="VipMember.html" class="dash-vip-banner" id="vipBanner" hidden>
        <div>
          <strong><i class="fa-solid fa-crown"></i> Trở thành hội viên VIP</strong>
          <span>Tích điểm, giảm giá đến 15% — đăng ký miễn phí.</span>
        </div>
        <span class="btn btn-orange btn-sm">Đăng ký ngay</span>
      </a>

      <div class="dash-grid">

        <article class="dash-card">
          <div class="dash-card-icon"><i class="fa-solid fa-seedling"></i></div>
          <div class="dash-card-info">
            <h3>Điểm tích lũy</h3>
            <p class="value" id="statPoints">0</p>
          </div>
        </article>
        <article class="dash-card">
          <div class="dash-card-icon dash-card-icon--green"><i class="fa-solid fa-mug-saucer"></i></div>
          <div class="dash-card-info">
            <h3>Ly đã thưởng thức</h3>
            <p class="value" id="statCups">0</p>
          </div>
        </article>
        <article class="dash-card">
          <div class="dash-card-icon dash-card-icon--red"><i class="fa-solid fa-heart"></i></div>
          <div class="dash-card-info">
            <h3>Món yêu thích</h3>
            <p class="value value--sm" id="statFavorite">—</p>
          </div>
        </article>
      </div>

      <section class="dash-recent">
        <div class="dash-recent-header">
          <h2>Đơn gần đây</h2>
          <a href="historyorder.html" class="btn btn-outline btn-sm">Xem toàn bộ</a>
        </div>
        <div class="table-scroll">
          <table class="order-table">
            <thead>
              <tr>
                <th>Mã đơn</th>
                <th>Ngày đặt</th>
                <th>Chi tiết</th>
                <th>Tổng</th>
                <th>Trạng thái</th>
              </tr>
            </thead>
            <tbody id="ordersTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="scripts/firebase-config.js"></script>
  <script src="scripts/services/app-storage.js"></script>
  <script src="scripts/member-ui.js"></script>
  <script src="scripts/dashboard.js"></script>
</body>

</html>
