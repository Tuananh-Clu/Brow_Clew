<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sản phẩm - Bold Brew</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/bold-brew.css">
  <link rel="stylesheet" href="styles/product.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script src="scripts/components.js" defer></script>
  <script src="scripts/product.js" defer></script>
</head>
<body class="artistic-bg">
  <header>
  </header>

  <section class="product-hero">
    <div class="container product-hero-inner">
      <h1>Bộ Sưu Tập Hương Vị</h1>
      <p>Khám phá sự tinh túy trong từng giọt cà phê. Những sự lựa chọn nghệ thuật được tuyển chọn gắt gao dành cho người sành điệu.</p>
      
      <div class="product-filters" id="product-filters">
        <button class="filter-btn active">Tất cả</button>
        
      </div>
    </div>
  </section>

  <div class="container">
    <div id="product-grid" class="artistic-product-grid">
    </div>
  </div>

  <div class="customize-modal" id="customizeModal">
    <div class="customize-overlay" id="customizeOverlay"></div>
    <div class="customize-content">
      <button class="customize-close" id="customizeClose">
        <i class="fa-solid fa-times"></i>
      </button>

      <div class="customize-header">
        <img id="modalProductImg" src="" alt="">
        <div class="customize-info">
          <h2 id="modalProductName"></h2>
          <p id="modalProductPrice"></p>
        </div>
      </div>

      <div class="customize-body">
        <form id="customizeForm" class="customization-form">
          <div id="modalCustomizationOptions"></div>
          <div id="modalToppingsSection" style="display: none;">
            <div class="custom-group">
              <label class="custom-label" data-icon="🍰">Topping Thêm</label>
              <div class="toppings-grid" id="modalToppingsGrid"></div>
            </div>
          </div>
        </form>
      </div>

      <div class="customize-footer">
        <div class="quantity-selector">
          <button type="button" class="qty-btn minus" id="modalQtyMinus">
            <i class="fa-solid fa-minus"></i>
          </button>
          <input type="number" id="modalQty" value="1" min="1" readonly>
          <button type="button" class="qty-btn plus" id="modalQtyPlus">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>
        <div style="flex: 1; display: flex; gap: 8px;">
          <button type="button" class="btn btn-outline" id="modalSaveBtn">
            <i class="fa-solid fa-bookmark"></i>
            Lưu Recipe
          </button>
          <button type="button" class="btn btn-orange" id="modalAddBtn">
            <i class="fa-solid fa-bag-shopping"></i>
            Thêm vào giỏ - <span id="modalTotalPrice">45,000đ</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="save-recipe-modal" id="saveRecipeModal">
    <div class="save-recipe-overlay" id="saveRecipeOverlay"></div>
    <div class="save-recipe-content">
      <button class="save-recipe-close" id="saveRecipeClose">
        <i class="fa-solid fa-times"></i>
      </button>
      <h2>Lưu Recipe</h2>
      <input type="text" id="recipeNameInput" placeholder="Đặt tên cho recipe này..." maxlength="50">
      <div class="recipe-preview" id="recipePreview"></div>
      <div class="save-recipe-footer">
        <button type="button" class="btn btn-outline" id="cancelSaveBtn">Hủy</button>
        <button type="button" class="btn btn-orange" id="confirmSaveBtn">Lưu Recipe</button>
      </div>
    </div>
  </div>

  <footer>
  </footer>
</body>
</html>
